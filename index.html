<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Sorgulama Paneli</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --success: #ffffff; --danger: #fee2e2; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; }
        h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.5rem; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; font-size: 18px; text-align: center; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: opacity 0.3s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #sonuc { margin-top: 25px; padding: 20px; border-radius: 15px; display: none; border: 1px solid #cbd5e1; text-align: left; background-color: #fff; }
        .name-label { font-size: 1.2rem; font-weight: bold; display: block; margin-bottom: 12px; color: #1e293b; text-transform: uppercase; text-align: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; color: #475569; }
        .info-row b { color: #1e293b; }
        
        /* DURUM KISMI İÇİN ÖZEL STİL */
        .status-box { 
            margin-top: 15px; 
            padding: 12px; 
            border-radius: 10px; 
            text-align: center; 
            font-weight: 900; /* Çok kalın */
            font-size: 1.2rem; 
            color: #dc2626; /* Kırmızı renk */
            background: #fef2f2; /* Hafif kırmızımsı arka plan */
            border: 2px solid #fecaca; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Öğrenci Sorgulama</h2>
    <div id="status" style="font-size:12px; margin-bottom:10px; color:#64748b;">Veriler Hazırlanıyor...</div>
    <input type="text" id="tcInput" placeholder="T.C. Kimlik No" maxlength="11">
    <button id="sorgulaBtn" onclick="sorgula()" disabled>SORGULA</button>
    <div id="sonuc"></div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSNIYTSZIgdE8jFsC9s3nA29_Q-Dlp5ytoDxzJ7dhw5FuEig0h9wIjEA4m0It_7vCuVPyd7RoVpjoFj/pub?gid=0&single=true&output=csv';
    let ogrenciData = {};

    function csvToArray(text) {
        let p = '', Array = [[]], Symbol = ',', i = 0, l = 0, q = false;
        for (let character of text) {
            if (character === '"') { q = !q; }
            else if (character === Symbol && !q) { p = ''; Array[i][++l] = p; }
            else if (character === '\n' && !q) { if (Array[i][l] === undefined) { Array[i][l] = p; } p = ''; Array[++i] = [p]; l = 0; }
            else { p += character; Array[i][l] = p; }
        }
        return Array;
    }

    async function verileriGetir() {
        try {
            const res = await fetch(csvUrl);
            const data = await res.text();
            const satirlar = csvToArray(data);
            
            satirlar.forEach((sutun, index) => {
                if (index === 0) return;
                
                if (sutun && sutun.length >= 5) {
                    const tc = sutun[0]?.trim();
                    const ad = sutun[1]?.trim();
                    const okulDev = sutun[2]?.trim();
                    const isyeriDev = sutun[3]?.trim(); 
                    const durum = sutun[4]?.trim() || "BİLGİ YOK"; 
                    
                    if(tc) {
                        ogrenciData[tc] = { 
                            ad: ad, 
                            okul: okulDev, 
                            isyeri: isyeriDev,
                            durum: durum 
                        };
                    }
                }
            });
            document.getElementById('status').innerHTML = "● Sistem Hazır";
            document.getElementById('sorgulaBtn').disabled = false;
        } catch (e) {
            document.getElementById('status').innerText = "Bağlantı Hatası!";
        }
    }

    function sorgula() {
        const input = document.getElementById('tcInput').value.trim();
        const sonucDiv = document.getElementById('sonuc');
        
        if (ogrenciData[input]) {
            const ogrenci = ogrenciData[input];
            sonucDiv.style.display = "block";
            sonucDiv.innerHTML = `
                <span class="name-label">${ogrenci.ad}</span>
                <div class="info-row"><span>Okul Devamsızlık:</span> <b>${ogrenci.okul} GÜN</b></div>
                <div class="info-row"><span>İşyeri Devamsızlık:</span> <b>${ogrenci.isyeri} GÜN</b></div>
                <div class="status-box">${ogrenci.durum}</div>
            `;
        } else {
            sonucDiv.style.display = "block";
            sonucDiv.style.backgroundColor = "var(--danger)";
            sonucDiv.innerHTML = "<div style='text-align:center; color:#991b1b; font-weight:bold;'>❌ KAYIT BULUNAMADI "DEVAMSIZLIK SAYINIZ 2 NİN ALTINDADIR"!</div>";
        }
    }

    document.getElementById('tcInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sorgula(); });
    verileriGetir();
</script>

</body>
</html>
